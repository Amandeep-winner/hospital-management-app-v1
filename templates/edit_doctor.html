{% extends "base.html" %}

{% block title %}Edit Doctor{% endblock %}


{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        #form-body{
            height: 500px;
            margin-top: 50px;
        }
    </style>
{% endblock %}

{% block search_box %}{% endblock %}

{% block content %}

<div id="main">
    <div id="canvas">
        <div id="form-body">

            <h2>Edit Doctor Profile</h2>

            <form method="POST" action="{{ url_for('edit_doctor', doctor_id=doctor.id) }}">
                <div>
                    <label for="name">Full Name</label>
                    <input type="text" 
                           name="name" 
                           id="name" 
                           value="{{ doctor.name }}" 
                           required 
                           placeholder="Dr. Sarah Johnson">
                </div>
                <div>
                    <label for="email">Email Address</label>
                    <input type="email" 
                           name="email" 
                           id="email" 
                           value="{{ doctor.email }}" 
                           required>
                </div>
                <div>
                    <label for="username">Username</label>
                    <input type="text" 
                           name="username" 
                           id="username" 
                           value="{{ doctor.username }}" 
                           required>
                </div>
                <div>
                    <label for="Dep_id">Department</label>
                    <select name="Dep_id" id="Dep_id" required>
                        <option value="" disabled>Select Department</option>
                        {% for dept in departments %}
                            <option value="{{ dept.id }}"
                                {% if dept.id == doctor.Dep_id %}selected{% endif %}>
                                {{ dept.dep_name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div style="margin-bottom: 20px;">
                    <label>Gender</label>
                    <div style="display:flex; gap:25px; margin-top:8px;">
                        <label>
                            <input type="radio" name="gender" value="Male" 
                                {% if doctor.gender == 'Male' %}checked{% endif %} required>
                            Male
                        </label>
                        <label>
                            <input type="radio" name="gender" value="Female" 
                                {% if doctor.gender == 'Female' %}checked{% endif %}>
                            Female
                        </label>
                    </div>
                </div>
                <div>
                    <input type="submit" value="Update Doctor" 
                           style="background-color: #28a745; margin-bottom: 10px;">
                </div>
                <div>
                    <a href="{{ url_for('admin_dashboard') }}">Cancel & Go Back</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
