{% extends "base.html" %}

{% block title %}Doctor Dashboard{% endblock %}

{% block content %}

<!-- Upcoming Appointments Section -->
<div class="section">
    <h3 style="margin-bottom: 15px; color: rgb(34, 2, 65);">Upcoming Appointments</h3>

    <table class="appoint-table">
        <thead>
            <tr>
                <th>Sr No.</th>
                <th>Patient Name</th>
                <th>Patient History</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <!-- Example Row 1 -->
            <tr>
                <td>1001</td>
                <td>Mr. Abcde</td>
                <td>
                    <button class="btn" 
                            style="background-color: #e3f2fd; border: 2px solid #2196f3; color: #1976d2;"
                            onmouseover="this.style.backgroundColor='#2196f3'; this.style.color='white'"
                            onmouseout="this.style.backgroundColor='#e3f2fd'; this.style.color='#1976d2'">
                        Update
                    </button>
                </td>
                <td>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn" 
                                style="background-color: #e8f5e9; border: 2px solid #4caf50; color: #2e7d32;"
                                onmouseover="this.style.backgroundColor='#4caf50'; this.style.color='white'"
                                onmouseout="this.style.backgroundColor='#e8f5e9'; this.style.color='#2e7d32'">
                            Mark as Complete
                        </button>
                        <button class="btn" 
                                style="background-color: white; border: 2px solid #f44336; color: #d32f2f;"
                                onmouseover="this.style.backgroundColor='#ffebee'"
                                onmouseout="this.style.backgroundColor='white'">
                            Cancel
                        </button>
                    </div>
                </td>
            </tr>

            <!-- Example Row 2 -->
            <tr>
                <td>1002</td>
                <td>Ms. Pqrst</td>
                <td>
                    <button class="btn" 
                            style="background-color: #e3f2fd; border: 2px solid #2196f3; color: #1976d2;"
                            onmouseover="this.style.backgroundColor='#2196f3'; this.style.color='white'"
                            onmouseout="this.style.backgroundColor='#e3f2fd'; this.style.color='#1976d2'">
                        Update
                    </button>
                </td>
                <td>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn" 
                                style="background-color: #e8f5e9; border: 2px solid #4caf50; color: #2e7d32;"
                                onmouseover="this.style.backgroundColor='#4caf50'; this.style.color='white'"
                                onmouseout="this.style.backgroundColor='#e8f5e9'; this.style.color='#2e7d32'">
                            Mark as Complete
                        </button>
                        <button class="btn" 
                                style="background-color: white; border: 2px solid #f44336; color: #d32f2f;"
                                onmouseover="this.style.backgroundColor='#ffebee'"
                                onmouseout="this.style.backgroundColor='white'">
                            Cancel
                        </button>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<!-- Assigned Patients Section -->
<div class="section">
    <div class="section-header">
        <h3>Assigned Patients</h3>
    </div>

    <div class="list-container">
        <div class="list-item">
            <span class="name">Mr. Abcde</span>
            <div class="actions">
                <button class="btn" 
                        style="background-color: white; border: 2px solid #4859f0; color: #4859f0;"
                        onmouseover="this.style.backgroundColor='#e3f2fd'"
                        onmouseout="this.style.backgroundColor='white'">
                    View
                </button>
            </div>
        </div>

        <div class="list-item">
            <span class="name">Miss. Pqrst</span>
            <div class="actions">
                <button class="btn" 
                        style="background-color: white; border: 2px solid #4859f0; color: #4859f0;"
                        onmouseover="this.style.backgroundColor='#e3f2fd'"
                        onmouseout="this.style.backgroundColor='white'">
                    View
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Provide Availability Button -->
<div style="display: flex; justify-content: flex-end; margin-top: 30px;">
    <button class="btn btn-create" 
            style="background-color: #e8f5e9; border: 3px solid #2e7d32; color: #2e7d32; font-weight: bold; padding: 12px 30px; font-size: 1.1em;"
            onmouseover="this.style.backgroundColor='#2e7d32'; this.style.color='white'"
            onmouseout="this.style.backgroundColor='#e8f5e9'; this.style.color='#2e7d32'"
            onclick="">
        Provide Availability
    </button>
</div>

{% endblock %}
