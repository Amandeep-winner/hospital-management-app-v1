{% extends "base.html" %}

{% block title %}Add New Doctor{% endblock %}

<!-- Load the special login/register stylesheet -->
{% block extra_css %}
    <link rel="stylesheet" href="/static/style.css">
    <style>
        #form-body{
            height: 600px;
            margin-top: 70px;
        }
        #canvas{
            height: 740px;
        }
    </style>
{% endblock %}

{% block search_box %}{% endblock %}

{% block content %}

<div id="main">
    <div id="canvas">
        <div id="form-body">

            <h2>Add a New Doctor</h2>

            <form method="POST" action="{{ url_for('doctor_register') }}">

                <!-- Full Name -->
                <div>
                    <label for="name">Full Name</label>
                    <input type="text" name="name" id="name" required placeholder="Dr. Sarah Johnson">
                </div>

                <!-- Email -->
                <div>
                    <label for="email">Email Address</label>
                    <input type="email" name="email" id="email" required placeholder="sarah@example.com">
                </div>

                <!-- Username -->
                <div>
                    <label for="username">Username</label>
                    <input type="text" name="username" id="username" required placeholder="sarah_doc">
                </div>

                <!-- Password -->
                <div>
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" required minlength="6" placeholder="••••••••">
                </div>

                <!-- Department -->
                <div>
                    <label for="Dep_id">Department</label>
                    <select name="Dep_id" id="Dep_id" required style="width:100%; padding:8px; border:1px solid #4859f0; border-radius:4px;">
                        <option value="" disabled selected>Select Department</option>
                        {% for dept in departments %}
                            <option value="{{ dept.id }}">{{ dept.dep_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Gender -->
                <div style="margin-bottom: 15px;">
                    <label>Gender</label>
                    <div style="display:flex; gap:20px; margin-top:8px;">
                        <label><input type="radio" name="gender" value="Male" required> Male</label>
                        <label><input type="radio" name="gender" value="Female"> Female</label>
                    </div>
                </div>

                <!-- Submit Button -->
                <div>
                    <input type="submit" value="Create Doctor Account">
                </div>

                <!-- Back Link -->
                <div>
                    <a href="{{ url_for('admin_dashboard') }}">Back to Admin Dashboard</a>
                </div>
            </form>

        </div>
    </div>
</div>

{% endblock %}
