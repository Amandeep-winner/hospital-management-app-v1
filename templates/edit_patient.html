{% extends "base.html" %}

{% block title %}Edit Patient{% endblock %}

<!-- Use the same login/register style as your other forms -->
{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        #form-body{
            height: 500px;
            margin-top: 50px;
        }
    </style>
{% endblock %}

{% block search_box %}{% endblock %}

{% block content %}

<div id="main">
    <div id="canvas">
        <div id="form-body">

            <h2>Edit Patient Profile</h2>

            <form method="POST" action="{% if session.get('user_type') == 'admin' %}{{ url_for('edit_patient', patient_id=patient.id) }}{% else %}{{ url_for('patient_profile', patient_id=patient.id) }}{% endif %}">

                <!-- Full Name -->
                <div>
                    <label for="name">Full Name</label>
                    <input type="text" 
                           name="name" 
                           id="name" 
                           value="{{ patient.name }}" 
                           required 
                           placeholder="Sarah Johnson">
                </div>

                <!-- Email -->
                <div>
                    <label for="email">Email Address</label>
                    <input type="email" 
                           name="email" 
                           id="email" 
                           value="{{ patient.email }}" 
                           required>
                </div>

                <!-- Username -->
                <div>
                    <label for="username">Username</label>
                    <input type="text" 
                           name="username" 
                           id="username" 
                           value="{{ patient.username }}" 
                           required>
                </div>

                <!--Age-->
                <div>
                    <label for="age">Age</label>
                    <input type="number" name="age" id="age" value="{{ patient.age }}" >
                </div>

                <!-- Gender -->
                <div style="margin-bottom: 20px;">
                    <label>Gender</label>
                    <div style="display:flex; gap:25px; margin-top:8px;">
                        <label>
                            <input type="radio" name="gender" value="Male" 
                                {% if patient.gender == 'Male' %}checked{% endif %} required>
                            Male
                        </label>
                        <label>
                            <input type="radio" name="gender" value="Female" 
                                {% if patient.gender == 'Female' %}checked{% endif %}>
                            Female
                        </label>
                    </div>
                </div>


                <!-- Buttons -->
                <div>
                    <input type="submit" value="Update Patient"
                           style="background-color: #28a745; margin-bottom: 10px;">
                </div>
                <div>
                    <a href="javascript:history.back()">Cancel & Go Back</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
